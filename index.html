<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASYKID - SHINY Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; }
        
        #ui-container {
            position: absolute; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            pointer-events: none; z-index: 10;
        }

        /* Estilo de la letra: Grande, blanca y con resplandor */
        .lyric-box {
            color: #fff; 
            font-size: 2.2rem; 
            font-weight: bold;
            text-transform: uppercase; 
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            opacity: 0; transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active { opacity: 1; transform: scale(1); filter: blur(0px); }
        
        /* Efecto de escaneo en el fondo */
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 5;
        }

        /* --- NUEVO: Pantalla de inicio para el audio --- */
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: #00ffff; letter-spacing: 5px;
            text-shadow: 0 0 10px #00ffff;
        }
    </style>
</head>

    </div>

            emissive: 0x001111, transmission: 0.3, thickness: 2
        });
        const mesh = new THREE.Mesh(geo, mat);
        scene.add(mesh);

        p1.position.set(5, 5, 5);
        scene.add(p1);

        let currentIdx = 0;
        function updateLyrics() {
            // Si llegamos al final, reiniciamos el índice (opcional, para el loop)
            if (currentIdx >= lyrics.length) currentIdx = 0;

            const fraseActual = lyrics[currentIdx];
            
            lyricEl.classList.remove('active');
            
            setTimeout(() => {
                lyricEl.innerText = fraseActual.text;
                lyricEl.classList.add('active');
                
                // Programamos la SIGUIENTE frase usando el tiempo de la frase ACTUAL
                // Así cada una dura lo que tú escribiste en la lista
                setTimeout(updateLyrics, fraseActual.time);
                
                currentIdx++;
            }, 400);
        }

        // Se movió al disparador del click para que no empiece antes que la música
        function iniciarCicloLetras() {
            const tiempoIntro = 7000; // Los 7 segundos de la música antes de cantar
            setTimeout(() => {
                updateLyrics(); 
            }, tiempoIntro);
        }

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            mesh.rotation.y += 0.01;
            mesh.rotation.z += 0.005;
            const scale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
            mesh.scale.set(scale, scale, scale);
            renderer.render(scene, camera);

            // El diamante saltará un poquito siguiendo el ritmo de 96 BPM
            const ritmo = Math.sin(Date.now() * 0.01); 
            if (ritmo > 0.9) {
            mesh.scale.set(1.2, 1.2, 1.2); // El "golpe" del bajo
            } else {
            mesh.scale.set(1.0, 1.0, 1.0); // Reposo
            }
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
